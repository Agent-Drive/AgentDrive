name: Publish to PyPI

on:
  push:
    branches:
      - main
    paths:
      - "packages/mcp/**"
  workflow_dispatch:

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Extract package version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('packages/mcp/pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Check if version exists on PyPI
        id: check
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/agentdrive-mcp/${PKG_VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Version ${PKG_VERSION} already on PyPI — skipping publish. If you changed MCP code, bump the version in packages/mcp/pyproject.toml."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_VERSION} not on PyPI — will publish"
          fi

      - name: Install build
        if: steps.check.outputs.exists == 'false'
        run: pip install build

      - name: Build package
        if: steps.check.outputs.exists == 'false'
        run: python -m build packages/mcp/

      - name: Publish to PyPI
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: packages/mcp/dist/
